nelmio_cors:
    defaults:
        skip_same_as_origin: false  # Важно!
        allow_origin: ['*']         # Или конкретные домены
        allow_headers: ['*']
        allow_methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
        expose_headers: ['*']
        max_age: 3600
    paths:
        '^/':                      # Применяется ко всем URL
            origin_regex: false
            allow_origin: ['*']     # Или ['http://localhost', 'https://ваш-домен']
            allow_headers: ['*']
            allow_methods: ['GET', 'POST', 'PUT', 'DELETE', 'OPTIONS']
            max_age: 3600