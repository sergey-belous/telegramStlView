; Подключается в apache2 и cli (см. symfony/Dockerfile).
; Важно: `php -i` в контейнере = только CLI; загрузки через сайт идут через SAPI Apache — оба должны иметь одинаковые лимиты.
; Если post_max_size меньше тела запроса, PHP обнуляет $_POST и $_FILES — Symfony видит «No files».
upload_max_filesize = 256M
post_max_size = 256M
max_file_uploads = 50
